# ================================================================
# JULES AUTONOMOUS LOOP — FULL AUTOMATION
# ================================================================
# This workflow does three things:
#   1. When Jules opens a PR → runs tests automatically
#   2. If tests pass → auto-merges the PR
#   3. On merge → reads SYSTEM_STATE.md, builds the next prompt,
#      and triggers Jules for the next iteration via the Jules CLI
# ================================================================

name: Jules Autonomous Loop

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Run tests when Jules opens a PR
  # ──────────────────────────────────────────────
  test-jules-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────
  # JOB 2: Auto-merge if tests passed
  # ──────────────────────────────────────────────
  auto-merge:
    needs: test-jules-pr
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge Jules PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Merge the PR that triggered this workflow
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash'
            });
            console.log(`✅ Auto-merged PR #${context.payload.pull_request.number}`);

  # ──────────────────────────────────────────────
  # JOB 3: Trigger Jules for the next iteration
  # ──────────────────────────────────────────────
  trigger-next-iteration:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Jules CLI
        run: npm install -g @google/jules

      - name: Authenticate Jules
        run: |
          # Uses a pre-configured API token stored as a GitHub Secret
          echo "${{ secrets.JULES_API_TOKEN }}" | jules login --token -

      - name: Read state and trigger next task
        run: |
          # Parse SYSTEM_STATE.md to extract current iteration and phase
          ITERATION=$(grep "Current Iteration:" SYSTEM_STATE.md | sed 's/[^0-9]*//g')
          PHASE=$(grep "Current Phase:" SYSTEM_STATE.md | sed 's/.*: //')

          echo "📍 Current Iteration: $ITERATION"
          echo "📍 Current Phase: $PHASE"

          # Safety valve: stop after iteration 10 is complete
          if [ "$ITERATION" -gt 10 ]; then
            echo "🏁 All 10 iterations complete. Pipeline finished!"
            exit 0
          fi

          # Build the next prompt dynamically
          REPO_NAME="${{ github.repository }}"

          PROMPT="You are the autonomous engineer for this repository.
          MANDATORY FIRST STEP: Read JULES_START_HERE.md, then SYSTEM_STATE.md, then ROADMAP.md.
          You are currently on Iteration ${ITERATION}, Phase: ${PHASE}.
          Execute that phase now.
          When done:
            1. Update SYSTEM_STATE.md to reflect the next phase.
            2. If you just completed 'Test', advance the iteration number by 1.
            3. If the next iteration is 5 or 10, set the phase to 'QA' and follow QA_PROTOCOL.md.
            4. Commit all changes and open a Pull Request."

          echo "🚀 Triggering Jules with prompt:"
          echo "$PROMPT"

          # Fire the task via Jules CLI
          jules remote new --repo "$REPO_NAME" --session "$PROMPT"

          echo "✅ Jules task dispatched for Iteration $ITERATION ($PHASE)"
